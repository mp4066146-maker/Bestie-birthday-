<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy 17th Birthday Bestie ❤️</title><script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script><style>
body{
margin:0;
font-family:Arial,sans-serif;
background:linear-gradient(135deg,#ff9ecf,#ffd6ea);
text-align:center;
overflow-x:hidden;
}

#loader{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#ff4d88;
display:flex;
justify-content:center;
align-items:center;
z-index:99999;
color:white;
font-size:26px;
font-weight:bold;
}

.hero{
padding:30px;
color:white;
}

.hero img{
width:260px;
height:260px;
object-fit:cover;
border-radius:50%;
border:8px solid white;
box-shadow:0 0 30px rgba(255,255,255,.7);
}

.card{
background:white;
margin:20px;
padding:20px;
border-radius:25px;
box-shadow:0 5px 20px rgba(0,0,0,.15);
}

.gallery img{
width:240px;
height:320px;
object-fit:cover;
border-radius:20px;
}

.heart,.balloon{
position:fixed;
pointer-events:none;
z-index:9999;
}

.heart{
animation:heartMove 12s linear forwards;
}

.balloon{
animation:balloonMove 18s linear forwards;
}

@keyframes heartMove{
0%{transform:translateY(100vh);}
100%{transform:translateY(-180vh);}
}

@keyframes balloonMove{
0%{transform:translateY(100vh);}
100%{transform:translateY(-220vh);}
}
</style></head>
<body><div id="loader">
🎁 A Special Surprise For Bestie ❤️
</div><div class="hero"><img id="slideshow" src="IMG-20260118-WA0005.jpg"><h1>🎂 Happy 17th Birthday Bestie 🎂</h1><h2>From Nitish Patel ❤️</h2><p>My Best Friend Forever 💖</p></div><div class="card"><h2>💌 A Special Message For You</h2><p id="typing"></p></div><div class="card"><h2>📸 Beautiful Memories</h2><div class="gallery">
<img id="slideImage" src="IMG-20260118-WA0005.jpg">
</div></div><button onclick="openGift()">🎁 Open Surprise Gift</button>

<div id="gift" class="card" style="display:none;"><h2>🎉 Surprise Gift 🎉</h2><p>
💖 Unlimited Happiness<br>
🌟 Success In Life<br>
😊 Beautiful Memories<br>
🎂 Wonderful Birthday<br>
🤝 Forever Friendship
</p></div>
<script>

const photos=[
"IMG-20260118-WA0005.jpg",
"IMG-20260404-WA0000.jpg",
"IMG-20260418-WA0006.jpg",
"IMG-20260613-WA0000.jpg",
"file_000000008b9871fa8c859153eaff21d4.png"
];

let current=0;

setInterval(()=>{
current=(current+1)%photos.length;
document.getElementById("slideImage").src=photos[current];
document.getElementById("slideshow").src=photos[current];
},3000);

const message="Hey Bestie ❤️ Aaj tumhara special day hai. Main dua karta hu ki tumhari life happiness, success aur beautiful memories se bhar jaye. Thank you for being such an amazing best friend. Happy 17th Birthday Bestie 🎂🎉";

let i=0;

function typeWriter(){
if(i<message.length){
document.getElementById("typing").innerHTML += message.charAt(i);
i++;
setTimeout(typeWriter,40);
}
}

window.onload=function(){

confetti({
particleCount:250,
spread:180,
origin:{y:0.6}
});

setTimeout(()=>{
document.getElementById("loader").style.display="none";
typeWriter();

alert("🎉 Welcome Bestie!\n\nA Special Birthday Surprise Awaits You ❤️");

},3000);

};

function openGift(){

document.getElementById("gift").style.display="block";

confetti({
particleCount:150,
spread:120
});

alert("🎂 Happy 17th Birthday Bestie ❤️\n\nFrom Nitish Patel");

}

setInterval(()=>{

let heart=document.createElement("div");
heart.className="heart";
heart.innerHTML="💖";
heart.style.left=Math.random()*100+"vw";
heart.style.fontSize=(20+Math.random()*25)+"px";

document.body.appendChild(heart);

setTimeout(()=>{
heart.remove();
},12000);

},1200);

setInterval(()=>{

let balloon=document.createElement("div");
balloon.className="balloon";
balloon.innerHTML="🎈";
balloon.style.left=Math.random()*100+"vw";
balloon.style.fontSize=(30+Math.random()*30)+"px";

document.body.appendChild(balloon);

setTimeout(()=>{
balloon.remove();
},18000);

},2000);

  </script>
